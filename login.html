<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description"
    content="SIGPRECO — Inicio de sesión institucional.">

  <title>SIGPRECO — Login</title>

  <link rel="stylesheet" href="css/styles.css">

</head>

<body>

  <!-- Accesibilidad -->
  <a href="#contenido" class="skip-link">
    Saltar al contenido principal
  </a>

  <!-- Layout login -->
  <main id="contenido" class="login-layout">

    <!-- Panel izquierdo -->
    <section class="login-hero">

      <div class="login-hero__content">

        <h1>
          SIGPRECO
        </h1>

        <p>
          Sistema integral para la gestión presupuestal,
          contratación pública y administración institucional.
        </p>

      </div>

    </section>

    <!-- Panel formulario -->
    <section class="login-form-section">

      <div class="login-card">

        <h2>
          Iniciar sesión
        </h2>

        <p>
          Acceda con sus credenciales institucionales.
        </p>

        <form action="index.html">

          <!-- Usuario -->
          <div class="form-field">

            <label for="usuario">
              Usuario
            </label>

            <input
              type="text"
              id="usuario"
              name="usuario"
              placeholder="Ingrese su usuario"
              required>

          </div>

          <!-- Contraseña -->
          <div class="form-field">

            <label for="password">
              Contraseña
            </label>

            <input
              type="password"
              id="password"
              name="password"
              placeholder="Ingrese su contraseña"
              required>

          </div>

          <!-- Botón -->
          <button type="submit">
            Ingresar al sistema
          </button>

        </form>

      </div>

    </section>

  </main>

</body>

</html>
